
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title if title else "Online Quiz System" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Online Quiz System</h1>
      <p>Lecturers create quizzes. Students attempt them. Scores stay saved in JSON.</p>
    </div>
    {% if user %}
    <nav>
      <span class="pill">{{ user.full_name }} · {{ user.role }}</span>
      <a href="{{ url_for('logout') }}" class="btn light">Logout</a>
    </nav>
    {% endif %}
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
